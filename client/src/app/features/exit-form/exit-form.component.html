<div class="main-wrapper main-bg">
    <main class="content-area">
        <div class="form-container">
            <a href="javascript:history.back()" class="back-button" aria-label="Torna indietro">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
            </a>

            <form [formGroup]="exitForm" (ngSubmit)="onSubmit()">

                <div class="input-row">
                    <input type="text" formControlName="firstName" placeholder="Nome / First Name *" required>
                    <input type="text" formControlName="lastName" placeholder="Cognome / Last Name *" required>
                </div>

                <button type="submit" class="submit-button" [disabled]="exitForm.invalid">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                    PROCEDI ALLA FIRMA / PROCEED TO SIGN
                </button>

            </form>
        </div>
    </main>

    <footer class="container-fluid py-3 border-top">
        <div class="row align-items-center">
            <div class="col-4 ps-4 text-muted small">
                Powered by www.GoGuest.it
            </div>
            <div class="col-4 text-center">
                <div class="fw-bold d-flex align-items-center justify-content-center">
                    <span class="badge bg-danger fs-3">GoGuest</span>
                </div>
            </div>
            <div class="col-4 text-end pe-4 text-muted small">
                {{ currentTime$ | async | date:'dd/MM/yyyy HH:mm:ss' }}
            </div>
        </div>
    </footer>
</div>
