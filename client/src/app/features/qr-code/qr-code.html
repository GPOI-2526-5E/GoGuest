<div class="container-fluid vh-100 d-flex flex-column justify-content-center align-items-center bg-light">
  
  <div class="card p-4 shadow-sm text-center" style="max-width: 500px; width: 100%;">
    <h2 class="mb-4">Scansione QR Code</h2>

    <div class="camera-wrapper mb-4 border rounded overflow-hidden">
      <zxing-scanner 
        (scanSuccess)="onCodeResult($event)"
        [formats]="allowedFormats"> </zxing-scanner>
    </div>

    <p class="text-muted small mb-4">
      <i class="bi bi-usb-symbol"></i> Oppure usa il lettore USB (verrà rilevato in automatico)
    </p>

    <div *ngIf="scannedResult" class="alert alert-success mt-3">
      <strong>Codice letto:</strong> {{ scannedResult }}
    </div>

    <button class="btn btn-outline-secondary mt-3" [routerLink]="['/']">
      Torna alla Home
    </button>
  </div>

</div>
