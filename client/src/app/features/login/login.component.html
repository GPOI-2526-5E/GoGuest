<div class="container-fluid vh-100 d-flex flex-column justify-content-between main-bg">

  <header class="custom-header row py-3 align-items-center">
    
    <div class="col-4 ps-4">
      <div class="tip-box">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" class="bi bi-lightbulb tip-icon flex-shrink-0" viewBox="0 0 16 16">
          <path d="M2 6a6 6 0 1 1 10.174 4.31c-.203.196-.359.4-.453.619l-.762 1.769A.5.5 0 0 1 10.5 13a.5.5 0 0 1 0 1 .5.5 0 0 1 0 1l-.224.447a1 1 0 0 1-.894.553H6.618a1 1 0 0 1-.894-.553L5.5 15a.5.5 0 0 1 0-1 .5.5 0 0 1 0-1 .5.5 0 0 1-.46-.302l-.761-1.77a1.964 1.964 0 0 0-.453-.618A5.984 5.984 0 0 1 2 6zm6-5a5 5 0 0 0-3.479 8.592c.263.254.514.564.676.941L5.83 12h4.342l.632-1.467c.162-.377.413-.687.676-.941A5 5 0 0 0 8 1z"/>
        </svg>
        <span class="tip-text">
          SE POSSIEDI UN QR CODE, CLICCACI SOPRA E SCANNERIZZALO <br>
          <span style="font-size: 0.6rem; color: #7f8c8d; font-weight: normal;">IF YOU HAVE A QR CODE, CLICK ON IT AND SCAN IT</span>
        </span>
      </div>
    </div>

    <div class="col-4 text-center">
      <h1 class="company-logo-new mb-0">GoGuest</h1>
      <small class="company-subtitle">DIGITAL TECHNOLOGY COMPANY</small>
    </div>

    <div class="col-4 pe-4 text-end">
      <span class="welcome-text fw-bold">BENVENUTI</span>
    </div>

  </header>

  
  <main class="row justify-content-center align-items-center flex-grow-1">
   
    <div class="col-12 col-md-4 text-center mb-4 mb-md-0">
      <div class="circle-btn-wrapper" (click)="handleAction('entrata')" [routerLink]="['/entry']">
        <div class="circle-btn green-btn">
          <span class="btn-title">ENTRATA</span>
          <span class="btn-subtitle">ENTRY</span>
        </div>
      </div>
    </div>

    <div class="col-12 col-md-4 text-center mb-4 mb-md-0">
      <div class="circle-btn-wrapper" (click)="handleAction('uscita')" [routerLink]="['/exit']">
        <div class="circle-btn blue-btn">
          <span class="btn-title">USCITA</span>
          <span class="btn-subtitle">EXIT</span>
        </div>
      </div>
    </div>

    <div class="col-12 col-md-4 text-center">
      <div class="circle-btn-wrapper" (click)="handleAction('qrcode')" [routerLink]="['/qrcode']">
        <div class="circle-btn purple-btn">
          <i class="bi bi-qr-code fs-1 mb-1"></i>
          <span class="btn-subtitle">QR CODE</span>
        </div>
      </div>
    </div>

  </main>

  <footer class="row py-3 bg-white border-top align-items-center">
    <div class="col-4 ps-4 text-muted small">
      Powered by www.GoGuest.it
    </div>
    <div class="col-4 text-center">
      <div class="fw-bold d-flex align-items-center justify-content-center">
        <img src="/assets/logo.png" class="img-fluid" style="max-height: 100px;">
      </div>
    </div>
    <div class="col-4 text-end pe-4 text-muted small">
      {{ currentTime$ | async | date:'dd/MM/yyyy HH:mm:ss' }}
    </div>
  </footer>

</div>
